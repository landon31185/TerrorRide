<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music | Terror Ride</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>

  <!-- Navigation -->
  <nav class="top-nav" role="navigation">
    <div class="logo">TERROR RIDE</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="music.html" class="active" aria-current="page">Music</a></li>
    </ul>
    <div class="hamburger-container" aria-label="Toggle navigation menu" aria-expanded="false">
      <div class="line top"></div>
      <div class="line middle"></div>
      <div class="line bottom"></div>
    </div>
  </nav>

  <!-- Mobile Menu with Flame Background -->
  <div class="mobile-menu">
    <video autoplay loop muted playsinline class="menu-bg-video">
      <source src="output.mp4" type="video/mp4">
      <source src="output.webm" type="video/webm">
    </video>
    <ul class="mobile-menu-items">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="music.html" class="active">Music</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <main id="main-content">
    <h1>Music</h1>

    <section class="album-section">
      <div class="album-card">

        <div class="album-art">
          <span class="album-art-text">PCC</span>
        </div>

        <div class="album-info">
          <h2>PCC</h2>
          <p class="album-subtitle">Pushing Capitalist Control</p>
          <p class="album-year">2025</p>

          <ul class="track-list">
            <li class="track-item">
              <span class="track-num">01</span>
              <span class="track-name">No Managers</span>
            </li>
            <li class="track-item">
              <span class="track-num">02</span>
              <span class="track-name">Debt Machine</span>
            </li>
            <li class="track-item">
              <span class="track-num">03</span>
              <span class="track-name">Quarterly Funeral</span>
            </li>
            <li class="track-item">
              <span class="track-num">04</span>
              <span class="track-name">The Shareholders Are Screaming</span>
            </li>
            <li class="track-item">
              <span class="track-num">05</span>
              <span class="track-name">West Seattle Burning</span>
            </li>
          </ul>

          <div class="stream-links">
            <a href="#" class="stream-btn">Spotify</a>
            <a href="#" class="stream-btn">Apple Music</a>
            <a href="#" class="stream-btn">Bandcamp</a>
          </div>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
